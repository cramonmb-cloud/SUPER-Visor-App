<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- PWA Basic Meta Tags (Will be updated by App.tsx) -->
    <meta name="application-name" content="SUPER VisorApp" />
    <meta name="apple-mobile-web-app-title" content="SUPER VisorApp" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Icons Placeholders -->
    <link rel="icon" type="image/png" href="" />
    <link rel="apple-touch-icon" href="" />
    <link rel="manifest" id="dynamic-manifest" />

    <!-- Aggressive Cache control headers for iOS -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>SUPER VisorApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#4f46e5',
              secondary: '#10b981',
              dark: '#1e293b',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
      html, body { 
        font-family: 'Inter', sans-serif; 
        overflow: hidden;
        height: 100%;
        width: 100%;
        position: fixed;
        overscroll-behavior: none;
        touch-action: manipulation;
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }

      /* PRINT STYLES FOR MAP */
      @media print {
        body * {
          visibility: hidden;
        }
        .printable-map-container, .printable-map-container * {
          visibility: visible;
        }
        .printable-map-container {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          height: 100vh !important;
          margin: 0;
          padding: 0;
          border: none !important;
          z-index: 9999;
        }
        .leaflet-control-container {
          display: none !important;
        }
        .map-legend-overlay {
           display: flex !important;
           visibility: visible !important;
           bottom: 20px !important;
           left: 20px !important;
           border: 1px solid #ccc;
        }
        .map-legend-overlay * {
           visibility: visible !important;
        }
      }
    </style>
<!-- GESTURE ZOOM PREVENTION & SERVICE WORKER -->
<script>
  document.addEventListener('gesturestart', (e) => e.preventDefault());
  document.addEventListener('gesturechange', (e) => e.preventDefault());
  document.addEventListener('gestureend', (e) => e.preventDefault());

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then(registration => {
        console.log('SW registered: ', registration);
      }).catch(registrationError => {
        console.log('SW registration failed: ', registrationError);
      });
    });
  }
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-900 h-screen overflow-hidden">
    <div id="root" class="h-full w-full"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
